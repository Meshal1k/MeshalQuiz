<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Quiz - Meshal Alsaedi</title>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        header { padding: 2rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .watermark {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.3;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 1000;
        }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; flex-grow: 1; }

        .quiz-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .quiz-card.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .options-grid { display: grid; gap: 1rem; margin-top: 1.5rem; }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .option-btn:hover:not([disabled]) { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .option-btn.correct { background: var(--success) !important; border-color: var(--success); }
        .option-btn.wrong { background: var(--error) !important; border-color: var(--error); }

        .controls { margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; }
        
        .btn {
            padding: 0.8rem 2rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: var(--primary);
            color: white;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        
        footer { text-align: center; padding: 2rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="watermark">MESHAL ALSAEDI</div>

    <header>
        <h1>PMP Practice Exam</h1>
        <p>Meshal Alsaedi</p>
    </header>

    <div class="container">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div id="quiz-box">
            <p style="text-align: center;">Loading questions from mcqs.json...</p>
        </div>
        
        <div id="results" class="quiz-card" style="text-align: center;">
            <h2>Quiz Finished!</h2>
            <p id="score-text" style="font-size: 2rem; color: var(--primary);"></p>
            <button class="btn" onclick="location.reload()">Try Again</button>
        </div>
    </div>

    <footer>&copy; 2026 | Meshal Alsaedi</footer>

    <script>
        let questions = [];
        let currentIdx = 0;
        let score = 0;

        // Fetch the data from your JSON file
        async function loadQuizData() {
            try {
                const response = await fetch('mcqs.json');
                const data = await response.json();
                questions = data.mcqs;
                renderQuestion();
            } catch (error) {
                document.getElementById('quiz-box').innerHTML = `<p style="color:red">Error loading mcqs.json. Make sure the file is in the same folder and you are using a local server (like Go Live in VS Code).</p>`;
            }
        }

        function renderQuestion() {
            const item = questions[currentIdx];
            const box = document.getElementById('quiz-box');
            
            const options = Object.entries(item.options).map(([key, val]) => `
                <button class="option-btn" onclick="checkAnswer(this, '${key}', '${item.correct_answer}')">
                    <b>${key}:</b> ${val}
                </button>
            `).join('');

            box.innerHTML = `
                <div class="quiz-card active">
                    <div style="font-size: 0.8rem; color: var(--primary); margin-bottom: 1rem;">
                        QUESTION ${currentIdx + 1} OF ${questions.length} | PAGE ${item.page}
                    </div>
                    <h3>${item.question}</h3>
                    <div class="options-grid">${options}</div>
                    <div class="controls">
                        <button class="btn" id="next" onclick="nextQuestion()" disabled>Next Question</button>
                    </div>
                </div>
            `;
        }

        function checkAnswer(btn, key, correct) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
            
            // Handle multiple correct answers (if the JSON has an array for correct_answer)
            const isCorrect = Array.isArray(correct) ? correct.includes(key) : key === correct;

            if (isCorrect) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                btns.forEach(b => {
                    const bKey = b.querySelector('b').innerText.replace(':', '');
                    if (Array.isArray(correct) ? correct.includes(bKey) : bKey === correct) {
                        b.classList.add('correct');
                    }
                });
            }
            document.getElementById('next').disabled = false;
        }

        function nextQuestion() {
            currentIdx++;
            document.getElementById('progress').style.width = (currentIdx / questions.length * 100) + '%';
            if (currentIdx < questions.length) {
                renderQuestion();
            } else {
                document.getElementById('quiz-box').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
            }
        }

        // Start the process
        loadQuizData();
    </script>
</body>
</html>
